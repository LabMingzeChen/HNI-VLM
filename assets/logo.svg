<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background; works on both light and dark READMEs -->

  <!-- Outer rounded square frame in deep teal -->
  <rect x="32" y="32" width="448" height="448" rx="72" ry="72"
        fill="#0F4C5C"/>

  <!-- Inner soft cream panel -->
  <rect x="64" y="64" width="384" height="384" rx="48" ry="48"
        fill="#F4F1E8"/>

  <!-- Leaf shape (Nature) -->
  <path d="M 175 305
           C 175 215, 240 145, 345 145
           C 345 250, 280 320, 175 305 Z"
        fill="#2E7D5B"/>
  <!-- Leaf vein -->
  <path d="M 195 295 C 245 245, 295 205, 340 165"
        stroke="#F4F1E8" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Camera lens (Vision-Language Model) overlapping leaf -->
  <circle cx="320" cy="325" r="68" fill="#0F4C5C"/>
  <circle cx="320" cy="325" r="52" fill="#F4F1E8"/>
  <circle cx="320" cy="325" r="38" fill="#0F4C5C"/>
  <circle cx="320" cy="325" r="22" fill="#5BC0AE"/>
  <!-- Lens highlight -->
  <circle cx="310" cy="312" r="6" fill="#F4F1E8" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="256" y="425"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        fill="#0F4C5C"
        text-anchor="middle"
        letter-spacing="2">HNI-VLM</text>
</svg>
